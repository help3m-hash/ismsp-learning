name: security-feed

# 매일 22:00 UTC = 한국 07:00. (UTC 기준, 서버 부하로 수~십수 분 지연될 수 있음)
# 수동 실행도 가능: Actions 탭 → 이 워크플로 → Run workflow
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치(feedparser)
        run: pip install feedparser

      - name: 보안 이슈 수집
        run: python ismsp_learning_app/security_feed/collect.py --days 2 --max 40

      - name: 변경 시 커밋·푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ismsp_learning_app/security_feed/security_issues.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 보안 이슈 피드 자동 갱신 (GitHub Actions)"
            git push
          fi
