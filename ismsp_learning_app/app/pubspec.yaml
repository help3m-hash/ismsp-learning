name: ismsp_learning
description: ISMS-P 인증기준 학습 앱 (오프라인 마이크로러닝)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  http: ^1.2.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/content/index.json
    - assets/content/glossary.json
    - assets/content/items/
    - assets/feed/security_issues.json

# 런처 아이콘 생성 설정: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/ic_launcher.png"
  adaptive_icon_background: "#1E5BCB"
  adaptive_icon_foreground: "assets/icon/ic_foreground.png"
  min_sdk_android: 21
